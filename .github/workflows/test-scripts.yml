name: Test Scripts

on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          set -euo pipefail
          cd .agent
          npm ci

      - name: Build agent
        run: |
          set -euo pipefail
          cd .agent
          npm run build

      - name: Runtime tests
        run: |
          set -euo pipefail
          cd .agent
          npm run test:runtime

      - name: Workflow and action checks
        run: |
          set -euo pipefail
          cd .agent
          npm run check:workflow

      - name: Docs hygiene checks
        run: |
          set -euo pipefail
          cd .agent
          npm run check:docs

      - name: Shell checks
        run: |
          set -euo pipefail
          cd .agent
          npm run check:shell

      - name: Diff hygiene
        run: git diff --check
