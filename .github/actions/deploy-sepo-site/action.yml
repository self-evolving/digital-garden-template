name: Deploy Sepo site

description: Deploy a built site artifact through the Sepo preview API.

inputs:
  artifact_id:
    description: GitHub Actions artifact id for the built site.
    required: true
  canonical:
    description: Set to true to deploy the repository default branch to its canonical site URL.
    required: false
    default: "false"
  server_url:
    description: Sepo preview API base URL.
    required: false
    default: https://preview-api.sepo.sh

outputs:
  url:
    description: Deployed site URL.
    value: ${{ steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - name: Deploy site
      id: deploy
      shell: bash
      env:
        ARTIFACT_ID: ${{ inputs.artifact_id }}
        CANONICAL: ${{ inputs.canonical }}
        SERVER_URL: ${{ inputs.server_url }}
      run: |
        set -euo pipefail

        retry_sleep() {
          sleep "$1"
        }

        should_retry_http() {
          [[ "$1" =~ ^(000|408|409|425|429|5[0-9][0-9])$ ]]
        }

        OIDC_BODY_FILE=$(mktemp)
        BODY_FILE=$(mktemp)
        trap 'rm -f "$OIDC_BODY_FILE" "$BODY_FILE"' EXIT

        TOK=""
        for attempt in 1 2 3; do
          : > "$OIDC_BODY_FILE"
          OIDC_CODE=$(curl --silent --show-error --max-time 30 -o "$OIDC_BODY_FILE" -w '%{http_code}' \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sepo-preview") || OIDC_CODE="000"
          if [[ "$OIDC_CODE" == 200 ]]; then
            TOK=$(jq -r '.value // empty' "$OIDC_BODY_FILE" 2>/dev/null || true)
            [[ -n "$TOK" ]] || { echo "::error::OIDC token response did not include a token"; exit 1; }
            break
          fi
          if [[ "$attempt" == 3 ]] || ! should_retry_http "$OIDC_CODE"; then
            cat "$OIDC_BODY_FILE" || true
            echo "::error::OIDC token fetch failed ($OIDC_CODE)"
            exit 1
          fi
          echo "::warning::OIDC token fetch attempt $attempt failed with HTTP $OIDC_CODE; retrying"
          retry_sleep "$attempt"
        done
        echo "::add-mask::$TOK"

        PAYLOAD=$(jq -nc --arg t "$TOK" --argjson a "$ARTIFACT_ID" --arg canonical "$CANONICAL" \
          '{oidc_token:$t,artifact_id:$a} + (if $canonical == "true" then {canonical:true} else {} end)')
        for attempt in 1 2 3; do
          : > "$BODY_FILE"
          CODE=$(curl --silent --show-error --max-time 30 -o "$BODY_FILE" -w '%{http_code}' \
            -X POST "$SERVER_URL/api/deploy/preview" \
            -H 'Content-Type: application/json' \
            --data "$PAYLOAD") || CODE="000"
          [[ "$CODE" == 200 ]] && break
          if [[ "$attempt" == 3 ]] || ! should_retry_http "$CODE"; then
            cat "$BODY_FILE" || true
            echo "::error::deploy failed ($CODE)"
            exit 1
          fi
          echo "::warning::deploy attempt $attempt failed with HTTP $CODE; retrying"
          retry_sleep "$attempt"
        done

        BODY=$(cat "$BODY_FILE")
        echo "$BODY"
        if ! URL=$(jq -er '.url | select(type == "string" and test("\\Ahttps?://[^[:space:][:cntrl:]]+\\z"))' <<<"$BODY"); then
          echo "::error::deploy response did not include a valid single-line http(s) url"
          exit 1
        fi
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        if [[ "$CANONICAL" == "true" ]]; then
          echo "### Canonical site: $URL" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "### Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
        fi
